<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact | NoodleMart</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="contact.css">

</head>

<body>

<header class="navbar">
    <div class="logo">
        <a href="index.html">NoodleMart</a>
    </div>  
    <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="shop/shop.html">Shop</a>
        <a href="contact.html">Contact</a>
    </nav>
    <div class="nav-icons">
        <input type="text" id="searchBox" placeholder="Search noodles...">
        <a href="cart.html" class="cart-icon">🛒</a>
        <a href="account.html" class="user-icon" title="User Account">👤</a>
    </div>
</header>

<!-- HERO -->
<section class="contact-hero">
    <h1>Contact NoodleMart 🍜</h1>
    <p>We’d love to hear from you</p>
</section>

<!-- CONTACT -->
<section class="contact-section">

    <!-- INFO -->
    <div class="contact-card">
        <h3>Get in Touch</h3>

        <div class="contact-item">
            <span>📧</span>
            <div>noodlemart@gmail.com</div>
        </div>

        <div class="contact-item">
            <span>📞</span>
            <div>+91 98765 43210</div>
        </div>

        <div class="contact-item">
            <span>📍</span>
            <div>India</div>
        </div>
    </div>

    <!-- FORM -->
    <div class="contact-form">
        <h3>Send a Message</h3>
        <input type="text" placeholder="Your Name">
        <input type="email" placeholder="Your Email">
        <textarea placeholder="Your Message"></textarea>
        <button>Send Message</button>
    </div>

</section>

<div class="contact-note">
    © 2025 NoodleMart • Designed with ❤️ using HTML, CSS & JavaScript
</div>

</body>
</html>
