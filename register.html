<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NoodleMart | Register</title>
  <link rel="stylesheet" href="register.css">
  
</head>

<body>

<div class="box">
  <h2>Create Account 🍜</h2>

  <input type="text" id="name" placeholder="Full Name">
  <input type="email" id="email" placeholder="Email Address">
  <input type="password" id="pass" placeholder="Password">
  <input type="password" id="cpass" placeholder="Confirm Password">

  <button onclick="register()">Register</button>

  <p>Already have an account? <a href="login.html">Login</a></p>
</div>

<script>
  function register() {
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const pass = document.getElementById("pass").value.trim();
    const cpass = document.getElementById("cpass").value.trim();

    if (name === "") {
      alert("Full Name cannot be empty.");
      return;
    }
    if (email === "") {
      alert("Email address is required.");
      return;
    }
    if (pass === "") {
      alert("Password field cannot be empty.");
      return;
    }
    if (cpass === "") {
      alert("Please confirm your password.");
      return;
    }
    if (pass !== cpass) {
      alert("Passwords do not match. Please re-enter.");
      return;
    }

    alert("Registration successful! Please login using your credentials.");
    window.location.href = "login.html";
  }
</script>

</body>
</html>
